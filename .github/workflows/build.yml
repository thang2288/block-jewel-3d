name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          if [ ! -f package.json ]; then
            npm init -y
            npm install @capacitor/core @capacitor/cli @capacitor/android
          else
            npm install --legacy-peer-deps --force
          fi

      - name: Prepare Capacitor & Fix Cordova Error
        run: |
          mkdir -p www
          if [ ! -f www/index.html ]; then
            echo '<!DOCTYPE html><html><head><title>Block Jewel 3D</title></head><body><h1>Block Jewel 3D</h1></body></html>' > www/index.html
          fi
          
          if [ ! -d "android" ]; then
            npx cap add android
          else
            npx cap sync android
          fi
          
          # Tự động tạo file cordova.variables bị thiếu
          mkdir -p android/capacitor-cordova-android-plugins
          touch android/capacitor-cordova-android-plugins/cordova.variables.gradle
          touch android/capacitor-cordova-android-plugins/build.gradle

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
